version: '3.8'

services:
  # 1. Banco de Dados Relacional (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    container_name: maestro-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-maestro}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - maestro_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Cache e Filas (Redis)
  redis:
    image: redis:7-alpine
    container_name: maestro-redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - maestro_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Banco de Dados Vetorial para IA (Qdrant)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: maestro-qdrant
    ports:
      - "6333:6333" # HTTP API
      - "6334:6334" # gRPC API
    volumes:
      - ./data/qdrant:/qdrant/storage
    networks:
      - maestro_net

  # 4. Orquestrador de Automação (n8n)
  n8n:
    image: n8nio/n8n:latest
    container_name: maestro-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Sao_Paulo
    volumes:
      - ./data/n8n:/home/node/.n8n
    networks:
      - maestro_net



# Volumes nomeados removidos pois agora usamos bind mounts no diretório ./data
# volumes:
#   postgres_data:
#   redis_data:
#   qdrant_data:
#   n8n_data:

networks:
  maestro_net:
    driver: bridge
