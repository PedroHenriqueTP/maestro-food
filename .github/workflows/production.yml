name: Maestro Production Flow (CI/CD)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-lint:
    name: Backend QA (E2E Tests)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies (Backend)
        run: |
          cd maestro-backend
          npm install

      - name: Run E2E Integration Tests
        run: |
          cd maestro-backend
          npm run test:e2e
          
  deploy-frontend:
    name: Deploy Frontend (Vercel Placeholder)
    runs-on: ubuntu-latest
    needs: test-and-lint
    if: github.ref == 'refs/heads/main'
    
